<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfroPay - Cadastro</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans',sans-serif;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:100%;
    max-width:400px;
    background:#141414;
    padding:30px;
    border-radius:15px;
}

h1{
    color:#fff;
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    height:50px;
    margin-bottom:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#222;
    color:#fff;
    font-size:15px;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:10px;
    background:#00e676;
    color:#000;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

a{
    display:block;
    margin-top:15px;
    text-align:center;
    color:#fff;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h1>Criar Conta</h1>

<input type="text" id="nome" placeholder="Nome completo">

<input type="email" id="email" placeholder="E-mail">

<input type="password" id="senha" placeholder="Senha">

<button onclick="cadastrar()">Cadastrar</button>

<a href="index.html">Já tenho uma conta</a>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
